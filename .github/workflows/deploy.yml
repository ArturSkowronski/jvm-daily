name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build JVM dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Build distribution
        run: ./gradlew installDist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/build/install/app/
          retention-days: 1

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-config
          path: config/
          retention-days: 1

  deploy-flyio:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image tag
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --image ${{ env.IMAGE }}:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-pi:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app-dist/

      - name: Download config artifact
        uses: actions/download-artifact@v4
        with:
          name: app-config
          path: app-config/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Pi via Tailscale SSH
        run: |
          sleep 5
          sudo tailscale status

          PI_IP="100.112.239.76"
          PI_USER="arturskowronski"
          PI_DIR="/home/arturskowronski/jvm-daily"

          # Use tailscale ssh instead of regular ssh (uses Tailscale SSH ACL, no keys needed)
          # First, create a tar of the dist to transfer in one go
          tar czf /tmp/app-dist.tar.gz -C app-dist .
          tar czf /tmp/app-config.tar.gz -C app-config .

          # Upload and extract on Pi
          sudo tailscale file cp /tmp/app-dist.tar.gz "${PI_IP}:" || {
            # Fallback: use regular SSH through Tailscale network
            scp -o StrictHostKeyChecking=no /tmp/app-dist.tar.gz "${PI_USER}@${PI_IP}:/tmp/"
            scp -o StrictHostKeyChecking=no /tmp/app-config.tar.gz "${PI_USER}@${PI_IP}:/tmp/"
            ssh -o StrictHostKeyChecking=no "${PI_USER}@${PI_IP}" "
              mkdir -p ${PI_DIR}/app ${PI_DIR}/config
              tar xzf /tmp/app-dist.tar.gz -C ${PI_DIR}/app/
              tar xzf /tmp/app-config.tar.gz -C ${PI_DIR}/config/
              rm -f /tmp/app-dist.tar.gz /tmp/app-config.tar.gz
              JAVA_HOME=/usr/lib/jvm/temurin-21-jre-arm64 ${PI_DIR}/app/bin/app --version 2>&1 || echo 'ok'
            "
            echo "✓ Pi deployment complete (via SSH fallback)"
            exit 0
          }

          # If tailscale file cp worked, extract on Pi via tailscale ssh
          sudo tailscale file cp /tmp/app-config.tar.gz "${PI_IP}:"
          sudo tailscale ssh "${PI_USER}@${PI_IP}" "
            mkdir -p ${PI_DIR}/app ${PI_DIR}/config
            tar xzf ~/taildrop/app-dist.tar.gz -C ${PI_DIR}/app/
            tar xzf ~/taildrop/app-config.tar.gz -C ${PI_DIR}/config/
            rm -f ~/taildrop/app-dist.tar.gz ~/taildrop/app-config.tar.gz
            JAVA_HOME=/usr/lib/jvm/temurin-21-jre-arm64 ${PI_DIR}/app/bin/app --version 2>&1 || echo 'ok'
          "
          echo "✓ Pi deployment complete"
