name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build JVM dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Build distribution
        run: ./gradlew installDist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/build/install/app/
          retention-days: 1

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-config
          path: config/
          retention-days: 1

  deploy-flyio:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only

  deploy-pi:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    continue-on-error: true  # Pi deploy via Tailscale is best-effort; use ./scripts/deploy-pi.sh as fallback
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app-dist/

      - name: Download config artifact
        uses: actions/download-artifact@v4
        with:
          name: app-config
          path: app-config/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Pi via SSH
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/pi_deploy
          chmod 600 ~/.ssh/pi_deploy
          SSH="ssh -i ~/.ssh/pi_deploy -o StrictHostKeyChecking=no"
          SCP="scp -i ~/.ssh/pi_deploy -o StrictHostKeyChecking=no"

          PI="arturskowronski@100.112.239.76"
          PI_DIR="/home/arturskowronski/jvm-daily"

          # Sync app dist + config via rsync
          rsync -az --delete -e "$SSH" app-dist/ "$PI:$PI_DIR/app/"
          rsync -az -e "$SSH" app-config/ "$PI:$PI_DIR/config/"

          # Verify
          $SSH "$PI" "JAVA_HOME=/usr/lib/jvm/temurin-21-jre-arm64 $PI_DIR/app/bin/app --version 2>&1 || echo 'ok'"
          echo "✓ Pi deployment complete"
