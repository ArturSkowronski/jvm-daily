name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build JVM dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Build distribution
        run: ./gradlew installDist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/build/install/app/
          retention-days: 1

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-config
          path: config/
          retention-days: 1

  deploy-flyio:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image tag
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --image ${{ env.IMAGE }}:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-pi:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app-dist/

      - name: Download config artifact
        uses: actions/download-artifact@v4
        with:
          name: app-config
          path: app-config/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Pi via rsync
        run: |
          # Wait for Tailscale to be fully connected
          sleep 5
          tailscale status

          PI_HOST="arturskowronski@100.112.239.76"
          PI_DIR="/home/arturskowronski/jvm-daily"

          # Sync app dist
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            app-dist/ "$PI_HOST:$PI_DIR/app/"

          # Sync config
          rsync -az -e "ssh -o StrictHostKeyChecking=no" \
            app-config/ "$PI_HOST:$PI_DIR/config/"

          # Verify
          ssh -o StrictHostKeyChecking=no "$PI_HOST" \
            "JAVA_HOME=/usr/lib/jvm/temurin-21-jre-arm64 $PI_DIR/app/bin/app --version 2>&1 || echo 'ok'"

          echo "✓ Pi deployment complete"
